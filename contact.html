<main class="contact-main">
  <div class="contact-header">
    <div class="contact-title">Contactez le support</div>
    <div class="contact-desc">Nous répondons en moins de 24h ouvrées.<br>Merci d’indiquer le maximum d’informations pour une résolution rapide.</div>
  </div>
  <form class="contact-form" id="contact-form">
    <div class="form-group">
      <label for="email">Adresse e-mail *</label>
      <input type="email" id="email" name="email" required autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="email2">Confirmez votre e-mail *</label>
      <input type="email" id="email2" name="email2" required autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="name">Votre nom</label>
      <input type="text" id="name" name="name" autocomplete="name" />
    </div>
    <div class="form-group">
      <label for="topic">Sujet de votre demande *</label>
      <select id="topic" name="topic" required>
        <option value="">— Choisir —</option>
        <option>Je rencontre un problème avec la livraison de mon code</option>
        <option>Je ne parviens pas à utiliser mon code</option>
        <option>J’essaie de faire un achat</option>
        <option>Tentative d’escroquerie ou de fraude</option>
        <option>Annulations et remboursements</option>
        <option>Informations générales</option>
        <option>Autre</option>
      </select>
    </div>
    <div class="form-group">
      <label for="message">Votre message *</label>
      <textarea id="message" name="message" rows="4" required placeholder="Expliquez-nous votre situation..."></textarea>
    </div>
    <div class="form-group">
      <label for="file">Pièce jointe (facultatif)</label>
      <input type="file" id="file" name="file" accept=".png,.jpg,.jpeg,.pdf" />
    </div>
    <button type="submit" class="contact-btn" id="contact-send-btn">
      Envoyer
    </button>
    <div class="contact-feedback" id="contact-feedback"></div>
  </form>
</main>
