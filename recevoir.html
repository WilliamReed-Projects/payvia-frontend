<!DOCTYPE html>
<html lang="fr">

<head>

    <script>
    if (!localStorage.getItem("jwt")) {
      window.location.replace("login.html");
    }
  </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recevoir - Payvia</title>
    <link rel="stylesheet" href="css/style2.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body class="bg-[#0f0f0f] text-white font-sans relative overflow-x-hidden">
    <div class="absolute inset-0 -z-10 bg-gradient-to-br from-[#2e0249] via-[#57059e] to-[#0f0f0f] blur-2xl opacity-30">
    </div>
    <!-- HEADER -->
     <header class="flex items-center justify-between p-4 border-b border-gray-800 gap-4 header-animate show">
  <div class="flex items-center gap-4">
    <a href="dashboard2.html" class="text-white">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-left w-6 h-6"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </a>
    <h1 class="text-xl font-bold text-cyan-400">Recevoir</h1>
  </div>
  <img src="assets/logo-white2.png" alt="Logo" class="h-7 w-auto rounded shadow">
</header>

    <!-- Liste des cryptos à recevoir -->
    <main class="p-4 pb-32 appear-anim">
        <div id="cryptoList"></div>
    </main>

    <!-- MODALE RECEVOIR -->
    <div id="receiveModal" class="modal hidden">
        <div class="modal-box text-center glass">
            <img id="receiveLogo" src="" alt="Crypto logo" class="mx-auto w-16 h-16 mb-4" />
            <canvas id="qrCanvas" class="mx-auto mb-4"></canvas>
            <div class="font-bold text-base mb-2" id="receiveTitle">
                Votre adresse Crypto
            </div>
            <div class="bg-white bg-opacity-10 p-2 rounded-lg flex items-center justify-between mb-3">
                <span id="cryptoAddress" class="truncate text-sm">Adresse crypto</span>
                <button id="copyBtn" class="ml-2 text-cyan-400 hover:text-cyan-200">
                    <i data-feather="copy"></i>
                </button>
            </div>
            <p id="receiveText" class="text-gray-400 text-sm mb-4">
                Recevoir Crypto
            </p>
            <button id="closeReceiveModal" class="btn-action w-full">
                Terminer
            </button>
        </div>
    </div>
    <script>

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.querySelector('.appear-anim')?.classList.add('show');
                feather.replace();
            }, 80);
            // ... le reste de ton code ...
        });

    </script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script src="js/recevoir.js"></script>
    <script>feather.replace();</script>
</body>

</html>
